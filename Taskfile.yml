version: "3"

tasks:
  setup-static:
    desc: One-time setup — copy JS to ui/static/js and compile CSS (run before first go build)
    cmds:
      - mkdir -p ui/static/css ui/static/js
      - cp assets/js/*.min.js ui/static/js/
      - tailwindcss -i ./assets/css/input.css -o ./ui/static/css/output.css --minify

  templ:
    desc: Watch .templ files and regenerate on change
    cmds:
      - go tool templ generate --watch

  tailwind:
    desc: Watch Tailwind CSS and recompile to ui/static/css/output.css
    cmds:
      - tailwindcss -i ./assets/css/input.css -o ./ui/static/css/output.css --watch

  dev:
    desc: Watch templ + Tailwind in parallel (run `make dev` for the air server in another terminal)
    cmds:
      - task --parallel tailwind templ

  build:
    desc: Production build — compile CSS, generate templ, then build the binary with embedded assets
    cmds:
      - tailwindcss -i ./assets/css/input.css -o ./ui/static/css/output.css --minify
      - go tool templ generate
      - CGO_ENABLED=0 go build -o ./tmp/wscore .
