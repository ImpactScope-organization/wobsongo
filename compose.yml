name: "wobsongocore"
services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_PASSWORD: "LocalDev123"
      POSTGRES_USER: "wobsongocore"
      POSTGRES_DB: "wobsongocore_db"
    volumes:
      - wobsongocorepgdata:/var/lib/postgresql
    ports:
      - 45432:5432
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "wobsongocore", "-d", "wobsongocore_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      netwobsongocore:
  minio:
    image: quay.io/minio/minio
    ports:
      - "9090:9000" # S3 API
      - "9091:9001" # Web UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - wobsongocore-miniodata:/data
    networks:
      netwobsongocore:
  mailhog:
    build:
      context: .
      dockerfile: mailhog.Dockerfile
    ports:
      - 1026:1025
      - 8026:8025
    networks:
      netwobsongocore:
  bugsink:
    image: bugsink/bugsink:2.1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      netwobsongocore:
    ports:
      - "8081:8000"
    environment:
      SECRET_KEY: yMLYThim9NybWgXiUGat32Aa0Qbgqscf4NPDQuZO2glcZPAiXn
      CREATE_SUPERUSER: wobsongocore:LocalDev123
      PORT: 8000
      DATABASE_URL: postgres://wobsongocore:LocalDev123@postgres:5432/wobsongocore_db?sslmode=disable
      BEHIND_HTTPS_PROXY: "false"
      USE_X_FORWARDED_HOST: "false"
      BASE_URL: "http://localhost:8081"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c ''import requests; requests.get("http://localhost:8000/").raise_for_status()''',
        ]
      interval: 5s
      timeout: 20s
      retries: 10

volumes:
  wobsongocorepgdata:
  wobsongocore-miniodata:

networks:
  netwobsongocore:
