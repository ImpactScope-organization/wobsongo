root = "."
tmp_dir = "tmp"

[build]
# pre_cmd = ["pnpm run dev"]
cmd = "go tool swag init -q --output ./swagger --generalInfo ./internal/core/app.go && CGO_ENABLED=0 go build -o ./tmp/wscore -p $(nproc) ."
bin = "tmp/wscore"
args_bin = ["-e", ".env", "serve"]
include_ext = ["go", "templ", "html", "json", "js", "ts", "css", "scss"]
exclude_dir = [
  "dist",
  "node_modules",
  "static",
  "tmp",
  "tests",
  "vendor",
  ".git",
  "swagger",
  "frontend",
  "specs",
  "docs",
  "sql",
]
exclude_regex = ["_test\\.go", "_templ\\.go"]
exclude_unchanged = true
follow_symlink = false
log = "build-errors-air.log"
poll = false
poll_interval = 500
delay = 500
stop_on_error = true
send_interrupt = false
kill_delay = 500
rerun = false
rerun_delay = 500

[log]
time = false
main_only = false

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true

[screen]
clear_on_rebuild = true
keep_scroll = true
